   <title>JSyn and the Microsoft JVM</title>

<script language="javascript">

// Change HTML in a DIV or other element
function htmlChange(id,message){
	d=document;
	re=d.all?d.all[id]:d.getElementById(id);
	re.innerHTML=message;
}

// This function will get called when the Applet is ready to be called.
// Print build info to screen.
function displayJavaInfo()
{
// Call public Java Applet methods to get various properties.
	msjvmBuild = document.JavaQueryApplet.getJavaBuild();
	if( msjvmBuild >= 3810 )
	{
		htmlChange("mydiv", "<h3>You already have the most recent version of Microsoft Java installed.</h3>\n");
	}
	else if( msjvmBuild < 0 )
	{
		htmlChange("mydiv", "<h3>You have a non-Microsoft version of Java installed.</h3>\n");
	}
	else
	{
		htmlChange("mydiv", "<h3>You are using Microsoft Java build # " + msjvmBuild + "</h3>\n");
	}

}


// This function will get called when the Applet is ready to be called.
// Use a timer to schedule the function that calls Java. This is because
// LiveConnect appears not to be reentrant on Sun Java so don't call:
//    Java -> JavaScript -> Java
// directly
function appletIsReady()
{
	htmlChange("mydiv", "Applet is ready." );
	setTimeout("displayJavaInfo();", 500);

}
</script>
